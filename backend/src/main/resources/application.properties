# --- HTTP ---
quarkus.http.port=${PORT:8080}

# CORS - allow the deployed Cloudflare Pages frontend to call this API
quarkus.http.cors=true
quarkus.http.cors.origins=${FRONTEND_ORIGIN:http://localhost:5173}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type
quarkus.http.cors.exposed-headers=X-Total-Count,X-Page,X-Page-Size

# --- MongoDB Atlas ---
# e.g. mongodb+srv://<user>:<password>@cluster0.xxxxx.mongodb.net/registration_db
# Scoped to dev/prod only (not %test): with no connection string configured
# for the test profile, Quarkus Dev Services automatically spins up a
# throwaway Mongo container for `mvn test`, so tests don't need a real
# database and don't touch real data. Requires Docker to be available
# wherever tests run.
%dev.quarkus.mongodb.connection-string=${MONGODB_URI:mongodb://localhost:27017}
%prod.quarkus.mongodb.connection-string=${MONGODB_URI}
quarkus.mongodb.database=registration_db

# --- JWT auth for /api/admin/** (any signed-up user who has logged in via /api/auth/login) ---
quarkus.http.auth.policy.user-policy.roles-allowed=user
quarkus.http.auth.permission.admin.paths=/api/admin/*
quarkus.http.auth.permission.admin.policy=user-policy

mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=event-registration-app
smallrye.jwt.sign.key.location=privateKey.pem

# --- Mailer (forgot-password reset emails) ---
# Point these at a real SMTP account to send real emails, e.g. Gmail (use an
# App Password, not your normal password), SendGrid, Mailtrap, etc.
#   MAIL_HOST=smtp.gmail.com  MAIL_PORT=587
#   MAIL_USERNAME=you@gmail.com  MAIL_PASSWORD=<16-char app password>
# In %dev and %test, Quarkus mocks the mailer by default: nothing is actually
# sent, and the message (including the reset link) is printed to the console
# instead - handy for trying the flow locally without real SMTP creds.
quarkus.mailer.from=${MAIL_FROM:no-reply@club-events.example}
quarkus.mailer.host=${MAIL_HOST:smtp.gmail.com}
quarkus.mailer.port=${MAIL_PORT:587}
quarkus.mailer.username=${MAIL_USERNAME:}
quarkus.mailer.password=${MAIL_PASSWORD:}
quarkus.mailer.start-tls=REQUIRED
%prod.quarkus.mailer.mock=false

# Base URL of the deployed frontend, used to build the password-reset link
# emailed to the user (e.g. https://your-app.pages.dev/reset-password?token=...).
app.frontend-url=${FRONTEND_ORIGIN:http://localhost:5173}
# How long a reset link stays valid.
app.reset-token-minutes=30
